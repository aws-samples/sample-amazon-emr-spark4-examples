AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EMR Serverless Applications and Execution Role for Spark Upgrade Validation.
  Creates source and target EMR Serverless applications with a shared execution role
  for running upgrade validation jobs and data quality checks.

Parameters:
  StagingBucketName:
    Type: String
    Description: >
      Name of the S3 staging bucket created by the spark-upgrade-mcp-setup stack
      (found in that stack's Outputs as StagingBucketName).
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'

  SourceApplicationName:
    Type: String
    Default: 'spark-upgrade-source'
    Description: Name for the source EMR Serverless application

  TargetApplicationName:
    Type: String
    Default: 'spark-upgrade-target'
    Description: Name for the target EMR Serverless application

  SourceReleaseLabel:
    Type: String
    Default: 'emr-7.0.0'
    Description: EMR release label for the source Spark version (e.g., emr-7.0.0 for Spark 3.5.0)

  TargetReleaseLabel:
    Type: String
    Default: 'emr-spark-8.0-preview'
    Description: EMR release label for the target Spark version (e.g., emr-spark-8.0-preview for Spark 4.0.1)

Resources:
  EMRServerlessExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${TargetApplicationName}-exec-role'
      Description: Shared execution role for source and target EMR Serverless validation jobs
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BucketObjectAccess
                Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                Resource:
                  - !Sub 'arn:aws:s3:::${StagingBucketName}/*'
              - Sid: BucketListAccess
                Effect: Allow
                Action:
                  - 's3:ListBucket'
                  - 's3:GetBucketLocation'
                Resource:
                  - !Sub 'arn:aws:s3:::${StagingBucketName}'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                  - 'logs:DescribeLogStreams'
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/emr-serverless:*'
              - Effect: Allow
                Action:
                  - 'logs:DescribeLogGroups'
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'

  SourceEMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Ref SourceApplicationName
      ReleaseLabel: !Ref SourceReleaseLabel
      Type: SPARK
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15

  TargetEMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Ref TargetApplicationName
      ReleaseLabel: !Ref TargetReleaseLabel
      Type: SPARK
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15

Outputs:
  SourceApplicationId:
    Description: Source EMR Serverless Application ID — used for data quality baseline
    Value: !Ref SourceEMRServerlessApplication
    Export:
      Name: !Sub '${AWS::StackName}-SourceApplicationId'

  TargetApplicationId:
    Description: Target EMR Serverless Application ID — used for upgrade validation
    Value: !Ref TargetEMRServerlessApplication
    Export:
      Name: !Sub '${AWS::StackName}-TargetApplicationId'

  ExecutionRoleArn:
    Description: Shared Execution Role ARN — used for both source and target jobs
    Value: !GetAtt EMRServerlessExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'
